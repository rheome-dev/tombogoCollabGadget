; PlatformIO Project Configuration
; Tombogo x Rheome Collab Gadget
;
; Install: pio pkg install
; Build:   pio run
; Upload:  pio run --target upload
; Monitor: pio device monitor

[platformio]
default_envs = waveshare-esp32s3
src_dir = firmware
src_filter = +<src/> -<wm8960_test.cpp>

[env:waveshare-esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Board configuration
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.partitions = huge_app.csv

; Serial configuration
upload_speed = 460800
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; PSRAM & Flash memory settings (ESP32-S3R8 = 8MB Octal PSRAM + 16MB Flash)
; memory_type = qio_opi: QIO for Flash, OPI for Octal PSRAM (critical for ESP32-S3R8)
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Wall
    -Wextra
    ; Platform definition (only in build flags, not in config.h)
    -DPLATFORM_ESP32=1
    ; PSRAM (tells compiler + libs that external RAM is available)
    -DBOARD_HAS_PSRAM
    -DPSRAM_FIXED
    ; LVGL configuration
    -DLV_CONF_INCLUDE_SIMPLE
    -Ifirmware
    -Ifirmware/lib

; Library dependencies
; Based on Waveshare ESP32-S3-Touch-AMOLED-1.75 specifications
lib_deps =
    ; Display - GFX Library for Arduino v1.5.0 (v1.6.4 has esp_private header incompatibility)
    moononournation/GFX Library for Arduino@1.5.0
    ; IMU & Touch - SensorLib (includes QMI8658, CST9217)
    lewisxhe/SensorLib@^0.3.4
    ; Power Management - AXP2101
    lewisxhe/XPowersLib@^0.3.3
    ; IO Expander - TCA9554 (onboard)
    adafruit/Adafruit XCA9554@^1.0.0
    ; External IO Expander - MCP23017 (for joystick, buttons, encoder)
    adafruit/Adafruit MCP23017 Arduino Library@^2.3.2
    ; LVGL
    lvgl/lvgl@^8.4.0