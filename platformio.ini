; PlatformIO Project Configuration
; Tombogo x Rheome Collab Gadget
;
; Install: pio pkg install
; Build:   pio run
; Upload:  pio run --target upload
; Monitor: pio device monitor

[platformio]
default_envs = waveshare-esp32s3
src_dir = firmware

[env:waveshare-esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Board configuration
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.partitions = huge_app.csv

; Serial configuration
upload_speed = 460800
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Wall
    -Wextra
    ; Platform definition (only in build flags, not in config.h)
    -DPLATFORM_ESP32=1
    ; Note: PSRAM disabled - causes SPI bus conflicts on this board
    ; -DBOARD_HAS_PSRAM
    ; -mfix-esp32-psram-cache-issue
    ; Use SPI2 (FSPI) for display - default SPI host, less likely to be pre-initialized
    ; -DESP32QSPI_SPI_HOST=SPI2_HOST
    ; LVGL configuration
    -DLV_CONF_INCLUDE_SIMPLE
    -Ifirmware
    -Ifirmware/lib

; Library dependencies
; Based on Waveshare ESP32-S3-Touch-AMOLED-1.75 specifications
lib_deps =
    ; Display - GFX Library for Arduino v1.5.0 (v1.6.4 has esp_private header incompatibility)
    moononournation/GFX Library for Arduino@1.5.0
    ; IMU & Touch - SensorLib (includes QMI8658, CST9217)
    lewisxhe/SensorLib@^0.3.4
    ; Power Management - AXP2101
    lewisxhe/XPowersLib@^0.3.3
    ; IO Expander - TCA9554
    adafruit/Adafruit XCA9554@^1.0.0
    ; LVGL
    lvgl/lvgl@^8.4.0